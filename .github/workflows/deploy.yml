name: Deploy to GCP
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Allow manual deployment

env:
  GCP_PROJECT: alpha-orion
  GAR_LOCATION: us-central1
  ARTIFACT_REGISTRY_REPO: alpha-orion-repo

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      run: |
        pip install -r backend-services/requirements.txt
        for service in backend-services/services/*/; do
          if [ -f "${service}requirements.txt" ]; then
            pip install -r "${service}requirements.txt"
          fi
        done

    - name: Run Python linting
      run: |
        for service in backend-services/services/*/; do
          if [ -d "${service}src" ]; then
            flake8 "${service}src" --max-line-length=88 --extend-ignore=E203,W503
            black --check "${service}src"
          fi
        done

    - name: Run Python tests
      run: |
        for service in backend-services/services/*/; do
          if [ -d "${service}tests" ]; then
            pytest "${service}tests" --cov="${service}src" --cov-report=xml
          fi
        done

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Node.js dependencies and run tests
      run: |
        for service in backend-services/services/user-api-service backend-services/services/withdrawal-service frontend; do
          if [ -f "${service}/package.json" ]; then
            cd "${service}"
            npm install
            npm run lint || true  # ESLint
            npm run format:check || true  # Prettier check
            npm test -- --coverage --passWithNoTests
            cd -
          fi
        done

    - name: Run E2E tests
      run: |
        cd frontend
        npm run cypress:run
        cd -

    - name: Security scan
      uses: github/super-linter/slim@v5
      env:
        DEFAULT_BRANCH: main
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Build and Push Docker Images
      id: build-images
      run: |
        # This list maps the Terraform lookup key to the service's source code path.
        # This should be the single source of truth for deployable services.
        # Format: "terraform-lookup-key=path/to/service"
        services=(
          "user-api-service=backend-services/services/user-api-service"
          "withdrawal-service=backend-services/services/withdrawal-service"
          "flash-loan-dashboard=frontend-dashboard"
          # Add other services from main.tf here as they are created and have a Dockerfile
          # e.g., "eye-scanner-us=backend-services/services/scanner-service"
        )

        # Create a variables file for Terraform to consume the image tags
        echo "# Auto-generated by GitHub Actions on $(date)" > terraform/image-versions.tfvars
        echo "image_versions = {" >> terraform/image-versions.tfvars

        for service_entry in "${services[@]}"; do
          IFS='=' read -r tf_key service_path <<< "$service_entry"
          if [ -f "${service_path}/Dockerfile" ]; then
            IMAGE_TAG_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${tf_key}:${{ github.sha }}"
            echo "Building and pushing ${tf_key} from ${service_path}"
            docker build -t "${IMAGE_TAG_URL}" "${service_path}/"
            docker push "${IMAGE_TAG_URL}"
            
            # Append the service version to the map in the .tfvars file
            echo "  \"${tf_key}\" = \"${{ github.sha }}\"," >> terraform/image-versions.tfvars
          else
            echo "Warning: Dockerfile not found for ${tf_key} in ${service_path}, skipping."
          fi
        done

        echo "}" >> terraform/image-versions.tfvars

        echo "Generated Terraform variables:"
        cat terraform/image-versions.tfvars

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.5.0

    - name: Terraform Init
      working-directory: terraform/
      run: terraform init

    - name: Terraform Plan
      working-directory: terraform/
      run: terraform plan -var-file="image-versions.tfvars" -out=tfplan

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main'
      working-directory: terraform/
      run: terraform apply -auto-approve tfplan
