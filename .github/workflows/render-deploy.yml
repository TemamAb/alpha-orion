name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Trigger Render Deployment
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.16.0' # Match the version in render.yaml

      - name: Install Dependencies & Verify Build
        run: npm install
        working-directory: ./backend-services/services/user-api-service

      - name: Call Render Deploy Hook
        env:
          DEPLOY_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "Error: RENDER_DEPLOY_HOOK_URL secret is not set in GitHub Secrets."
            exit 1
          fi
          curl -X POST "$DEPLOY_URL"