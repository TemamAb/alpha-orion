version: '3.8'

services:
  # Database
  db:
    image: postgres:13
    ports:
      - "3007:5432"
    environment:
      - POSTGRES_DB=alpha_orion
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d alpha_orion"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7-alpine
    ports:
      - "3008:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - REACT_APP_API_URL=http://localhost:3001
    depends_on:
      - user-api-service

  # Main API Gateway
  user-api-service:
    build:
      context: ./backend-services/services/user-api-service
      dockerfile: Dockerfile
    ports:
      - "3001:8080"
    environment:
      - NODE_ENV=development
      - GCP_PROJECT_ID=alpha-orion
      - DATABASE_URL=postgresql://user:password@db:5432/alpha_orion
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Withdrawal Service
  withdrawal-service:
    build:
      context: ./backend-services/services/withdrawal-service
      dockerfile: Dockerfile
    ports:
      - "3009:8081"
    environment:
      - GCP_PROJECT_ID=alpha-orion
      - DATABASE_URL=postgresql://user:password@db:5432/alpha_orion
      - REDIS_URL=redis://redis:6379
