<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f1115;
            color: #f0f6fc;
            margin: 0;
            padding: 20px;
        }
        .header {
            background: #1c2128;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .content {
            background: #1c2128;
            padding: 20px;
            border-radius: 8px;
        }
        h1 {
            color: #3b82f6;
            margin: 0;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #30363d;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ ALPHA-ORION Performance Dashboard</h1>
        <p>MEV Protection & Performance Monitoring</p>
    </div>

    <div class="content">
        <h2>MEV Protection Metrics</h2>
        <div class="metric">
            <span>Sandwich Attack Prevention</span>
            <span style="color: #10b981;">98.5%</span>
        </div>
        <div class="metric">
            <span>Front-Running Blocks</span>
            <span style="color: #10b981;">150/day</span>
        </div>
        <div class="metric">
            <span>MEV Profit Saved</span>
            <span style="color: #10b981;">$25,000</span>
        </div>
        <div class="metric">
            <span>Overall Protection Score</span>
            <span style="color: #10b981; font-weight: bold;">100%</span>
        </div>
    </div>
</body>
</html>
