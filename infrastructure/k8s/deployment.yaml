apiVersion: v1
kind: ServiceAccount
metadata:
  name: alpha-orion-sa
  # Namespace is handled by kubectl apply -n
  annotations:
    iam.gke.io/gcp-service-account: alpha-08-execution@alpha-orion-485207.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: service-reader
  namespace: alpha-08
rules:
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: service-reader-binding
  namespace: alpha-08
subjects:
- kind: ServiceAccount
  name: alpha-orion-sa
  namespace: alpha-08
roleRef:
  kind: Role
  name: service-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-orion-core
  labels:
    app: alpha-orion-core
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpha-orion-core
  template:
    metadata:
      labels:
        app: alpha-orion-core
    spec:
      serviceAccountName: alpha-orion-sa
      containers:
      - name: core
        image: us-central1-docker.pkg.dev/alpha-orion-485207/alpha-orion-repo/core:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 10
        env:
        - name: PROJECT_ID
          value: "alpha-orion-485207"
        - name: ENVIRONMENT
          value: "production"
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-orion-core
spec:
  selector:
    app: alpha-orion-core
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000 # Routing to FastAPI
  type: LoadBalancer
