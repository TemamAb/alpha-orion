steps:
  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$_PROJECT_ID/alpha-orion-core', '.']

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$_PROJECT_ID/alpha-orion-core']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'alpha-orion-core'
      - '--image'
      - 'gcr.io/$_PROJECT_ID/alpha-orion-core'
      - '--region'
      - '$_REGION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '1Gi'
      - '--set-env-vars'
      - 'NODE_ENV=production'

images:
  - 'gcr.io/$_PROJECT_ID/alpha-orion-core'

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s  # 20 minutes

tags:
  - 'alpha-orion-enterprise'