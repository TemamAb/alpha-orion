<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-ORION | Enterprise Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #161b22;
            --bg-card: #1c2128;
            --accent-primary: #3b82f6;
            --accent-secondary: #10b981;
            --accent-danger: #ef4444;
            --accent-warning: #f59e0b;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent-primary);
            margin-bottom: 15px;
        }

        .metric-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-secondary);
            margin: 10px 0;
        }

        .metric-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; color: var(--accent-primary);">ALPHA-ORION Enterprise Dashboard</h1>
    <p style="text-align: center; color: var(--text-muted);">Real-time arbitrage performance monitoring</p>

    <div class="dashboard-grid">
        <div class="card">
            <div class="card-title">Total P&L</div>
            <div class="metric-value">$125,430.67</div>
            <div class="metric-label">Realized: $98,230.45</div>
        </div>

        <div class="card">
            <div class="card-title">Active Opportunities</div>
            <div class="metric-value">47</div>
            <div class="metric-label">Cross-exchange arbitrage</div>
        </div>

        <div class="card">
            <div class="card-title">Success Rate</div>
            <div class="metric-value">87.3%</div>
            <div class="metric-label">Last 24 hours</div>
        </div>

        <div class="card">
            <div class="card-title">MEV Protection</div>
            <div class="metric-value">98.5%</div>
            <div class="metric-label">Attack prevention rate</div>
        </div>
    </div>

    <script>
        // Auto-refresh dashboard every 30 seconds
        setInterval(() => {
            location.reload();
        }, 30000);
    </script>
</body>
</html>
