<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALPHA-ORION | Live Profit Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-panel: #161b22;
            --bg-card: #1c2128;
            --accent-primary: #3b82f6;
            --accent-secondary: #10b981;
            --accent-danger: #ef4444;
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
            --border-color: #30363d;
        }

        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .profit-display {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-secondary);
            text-align: center;
            margin: 20px 0;
        }

        .chart-container {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            margin: 20px 0;
            height: 400px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-primary);
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 style="color: var(--accent-primary);">ALPHA-ORION Live Profit Dashboard</h1>
        <p style="color: var(--text-muted);">Real-time arbitrage profit tracking</p>
    </div>

    <div class="profit-display">
        $<span id="total-profit">0.00</span>
    </div>

    <div class="chart-container">
        <canvas id="profitChart"></canvas>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="trades-count">0</div>
            <div class="stat-label">Total Trades</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="success-rate">0%</div>
            <div class="stat-label">Success Rate</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="avg-profit">$0.00</div>
            <div class="stat-label">Avg Profit/Trade</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="profit-hour">$0.00</div>
            <div class="stat-label">Profit/Hour</div>
        </div>
    </div>

    <script>
        // Mock data for demonstration
        let profitData = [];
        let totalProfit = 0;
        let tradesCount = 0;

        // Initialize chart
        const ctx = document.getElementById('profitChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Profit Over Time',
                    data: [],
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: '#30363d'
                        },
                        ticks: {
                            color: '#8b949e'
                        }
                    },
                    x: {
                        grid: {
                            color: '#30363d'
                        },
                        ticks: {
                            color: '#8b949e'
                        }
                    }
                },
                plugins: {
                    legend: {
                        labels: {
                            color: '#f0f6fc'
                        }
                    }
                }
            }
        });

        // Simulate real-time profit updates
        function updateProfit() {
            const profit = (Math.random() - 0.3) * 1000; // Bias towards positive
            totalProfit += profit;
            tradesCount++;

            // Update display
            document.getElementById('total-profit').textContent = totalProfit.toFixed(2);
            document.getElementById('trades-count').textContent = tradesCount;

            const successRate = ((totalProfit > 0 ? 1 : 0) * 100).toFixed(1);
            document.getElementById('success-rate').textContent = successRate + '%';

            const avgProfit = (totalProfit / tradesCount).toFixed(2);
            document.getElementById('avg-profit').textContent = '$' + avgProfit;

            const profitPerHour = (totalProfit / 24).toFixed(2);
            document.getElementById('profit-hour').textContent = '$' + profitPerHour;

            // Update chart
            const now = new Date().toLocaleTimeString();
            chart.data.labels.push(now);
            chart.data.datasets[0].data.push(totalProfit);

            // Keep only last 50 points
            if (chart.data.labels.length > 50) {
                chart.data.labels.shift();
                chart.data.datasets[0].data.shift();
            }

            chart.update();
        }

        // Update every 5 seconds
        setInterval(updateProfit, 5000);

        // Initial update
        updateProfit();
    </script>
</body>
</html>
