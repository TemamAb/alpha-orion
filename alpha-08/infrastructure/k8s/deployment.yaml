apiVersion: v1
kind: ServiceAccount
metadata:
  name: alpha-08-sa
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: alpha-08-execution@alpha-orion-485207.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-08-engine
  labels:
    app: alpha-08
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpha-08
  template:
    metadata:
      labels:
        app: alpha-08
    spec:
      serviceAccountName: alpha-08-sa
      nodeSelector:
        workload: alpha-08-hft
      containers:
      - name: calibration-engine
        image: us-central1-docker.pkg.dev/alpha-orion-485207/alpha-08/engine:latest
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        env:
        - name: PROJECT_ID
          value: "alpha-orion-485207"
        - name: ENVIRONMENT
          value: "production"
      - name: sovereign-hub
        image: us-central1-docker.pkg.dev/alpha-orion-485207/alpha-08/hub:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-08-svc
spec:
  selector:
    app: alpha-08
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000 # Routing to FastAPI
  type: LoadBalancer
