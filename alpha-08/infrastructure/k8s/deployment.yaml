apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpha-08-engine
  labels:
    app: alpha-08
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alpha-08
  template:
    metadata:
      labels:
        app: alpha-08
    spec:
      serviceAccountName: alpha-08-sa
      nodeSelector:
        workload: alpha-08-hft
      containers:
      - name: calibration-engine
        image: gcr.io/PROJECT_ID/alpha-08-calibration:latest
        resources:
          requests:
            cpu: "1000m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        env:
        - name: PROJECT_ID
          value: "PROJECT_ID"
        - name: ENVIRONMENT
          value: "production"
      - name: sovereign-hub
        image: gcr.io/PROJECT_ID/alpha-08-hub:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: alpha-08-svc
spec:
  selector:
    app: alpha-08
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: LoadBalancer
