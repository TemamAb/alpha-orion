<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha-08 Profit Hub</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0c0e;
            --bg-panel: #111217;
            --bg-card: #181b1f;
            --bg-hover: #22252b;
            --accent-primary: #3274d9;
            --accent-secondary: #56a64b;
            --accent-danger: #e02f44;
            --accent-warning: #f2cc0c;
            --text-main: #d8d9da;
            --text-muted: #9da2a7;
            --border-color: #2c3235;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            line-height: 1.4;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* HEADER */
        header {
            background: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
        }

        .logo-box {
            width: 20px;
            height: 20px;
            background: var(--accent-primary);
            border-radius: 2px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .refresh-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .refresh-select {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.3rem 0.5rem;
            border-radius: 2px;
            font-size: 0.7rem;
            font-family: 'JetBrains Mono', monospace;
        }

        .live-badge {
            background: rgba(224, 47, 68, 0.1);
            border: 1px solid var(--accent-danger);
            color: var(--accent-danger);
            padding: 3px 8px;
            border-radius: 2px;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .live-pulse {
            width: 6px;
            height: 6px;
            background: var(--accent-danger);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        /* MAIN LAYOUT */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
        }

        .panel {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 1rem;
        }

        .panel-header {
            font-size: 0.65rem;
            color: var(--accent-primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        /* PROFIT DISPLAY */
        .profit-display {
            text-align: center;
            padding: 1.5rem 0;
        }

        .profit-label {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .profit-value {
            font-size: 2.5rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-secondary);
            margin: 0.5rem 0;
        }

        .profit-subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        /* WITHDRAWAL SECTION */
        .input-group {
            margin: 0.75rem 0;
        }

        .input-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 0.4rem;
            display: block;
        }

        .input-field {
            width: 100%;
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 0.75rem;
            border-radius: 2px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--accent-primary);
        }

        .mode-selector {
            display: flex;
            gap: 0.5rem;
            margin: 0.75rem 0;
        }

        .mode-btn {
            flex: 1;
            padding: 0.5rem;
            background: #202226;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 2px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            font-size: 0.7rem;
        }

        .mode-btn:hover {
            background: #2c3235;
        }

        .mode-btn.active {
            background: rgba(50, 116, 217, 0.2);
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }

        .wallet-display {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .wallet-display input {
            flex: 1;
        }

        .btn {
            padding: 0.5rem 1rem;
            border-radius: 2px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .btn-primary {
            background: var(--accent-primary);
            color: #fff;
        }

        .btn-success {
            background: var(--accent-secondary);
            color: #fff;
            width: 100%;
            margin-top: 0.75rem;
        }

        .btn-secondary {
            background: #202226;
            border: 1px solid var(--border-color);
            color: var(--text-main);
        }

        .btn:hover {
            filter: brightness(1.1);
        }

        /* BLOCKCHAIN INFO */
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #202226;
            font-size: 0.75rem;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: var(--text-muted);
        }

        .info-value {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
        }

        /* TRANSFER HISTORY */
        .transfer-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.7rem;
        }

        .transfer-table th {
            background: #202226;
            padding: 0.5rem;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: var(--accent-primary);
            border-bottom: 1px solid var(--border-color);
            text-align: left;
        }

        .transfer-table td {
            padding: 0.5rem;
            border-bottom: 1px solid #202226;
            font-family: 'JetBrains Mono', monospace;
        }

        .transfer-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            padding: 2px 6px;
            border-radius: 2px;
            font-size: 0.65rem;
        }

        .status-pending {
            background: rgba(242, 204, 12, 0.1);
            color: var(--accent-warning);
            border: 1px solid rgba(242, 204, 12, 0.2);
        }

        .status-completed {
            background: rgba(86, 166, 75, 0.1);
            color: var(--accent-secondary);
            border: 1px solid rgba(86, 166, 75, 0.2);
        }

        .tx-hash {
            color: var(--accent-primary);
            text-decoration: none;
            font-size: 0.7rem;
        }

        .tx-hash:hover {
            text-decoration: underline;
        }

        /* NOTIFICATION */
        .notification {
            padding: 0.75rem;
            border-radius: 4px;
            margin-bottom: 1rem;
            display: none;
            font-size: 0.75rem;
        }

        .notification.show {
            display: block;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notification.success {
            background: rgba(86, 166, 75, 0.1);
            border: 1px solid var(--accent-secondary);
            color: var(--accent-secondary);
        }

        .notification.error {
            background: rgba(224, 47, 68, 0.1);
            border: 1px solid var(--accent-danger);
            color: var(--accent-danger);
        }

        .hidden {
            display: none !important;
        }

        .m-pos {
            color: var(--accent-secondary);
        }
    </style>
</head>

<body>
    <header>
        <div class="header-brand">
            <div class="logo-box"></div>
            <span>Alpha-08 Profit Hub</span>
        </div>
        <div class="header-controls">
            <div class="refresh-control">
                <span>Currency:</span>
                <select class="refresh-select" id="currency-selector" onchange="updateCurrency()">
                    <option value="USD" selected>USD</option>
                    <option value="ETH">ETH</option>
                </select>
            </div>
            <div class="refresh-control">
                <span>Refresh:</span>
                <select class="refresh-select" id="refresh-interval" onchange="updateRefreshInterval()">
                    <option value="1000">1s</option>
                    <option value="2000">2s</option>
                    <option value="5000" selected>5s</option>
                    <option value="10000">10s</option>
                    <option value="15000">15s</option>
                    <option value="30000">30s</option>
                </select>
            </div>
            <div class="live-badge">
                <span class="live-pulse"></span>
                LIVE
            </div>
        </div>
    </header>

    <div class="container">
        <div id="notification" class="notification"></div>

        <div class="main-grid">
            <!-- Profit Balance -->
            <div class="panel">
                <div class="panel-header">Profit Balance</div>
                <div class="profit-display">
                    <div class="profit-label">Withdrawable Balance</div>
                    <div class="profit-value" id="profit-balance">$0.00</div>
                    <div class="profit-subtitle">Real-time blockchain balance</div>
                </div>
                <div style="margin-top: 1rem;">
                    <div class="info-row">
                        <span class="info-label">Session Profit</span>
                        <span class="info-value m-pos" id="session-profit">$0.00</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Cumulative Total</span>
                        <span class="info-value m-pos" id="cumulative-profit">$0.00</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Last Updated</span>
                        <span class="info-value" id="last-update">--:--:--</span>
                    </div>
                </div>
            </div>

            <!-- Withdrawal Control -->
            <div class="panel">
                <div class="panel-header">Withdrawal Control</div>

                <div class="input-group">
                    <label class="input-label">Mode</label>
                    <div class="mode-selector">
                        <div class="mode-btn active" id="mode-manual" onclick="setMode('MANUAL')">Manual</div>
                        <div class="mode-btn" id="mode-auto" onclick="setMode('AUTO')">Auto</div>
                    </div>
                </div>

                <div class="input-group" id="threshold-group" style="display: none;">
                    <label class="input-label">Auto Threshold (USD)</label>
                    <input type="number" class="input-field" id="threshold-input" placeholder="1000.00" value="1000">
                </div>

                <div class="input-group" id="amount-group">
                    <label class="input-label">Amount (USD)</label>
                    <input type="number" class="input-field" id="amount-input" placeholder="Enter amount">
                </div>

                <div class="input-group">
                    <label class="input-label">Wallet Address</label>
                    <div class="wallet-display">
                        <input type="text" class="input-field" id="wallet-input" placeholder="0x...">
                        <button class="btn btn-secondary" onclick="saveWallet()">Save</button>
                    </div>
                </div>

                <button class="btn btn-success" onclick="executeWithdrawal()">Execute Withdrawal</button>
            </div>
        </div>

        <!-- Transfer History -->
        <div class="panel" style="margin-top: 1rem;">
            <div class="panel-header">Transfer History</div>
            <div style="overflow-x: auto;">
                <table class="transfer-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Amount</th>
                            <th>Wallet</th>
                            <th>Mode</th>
                            <th>Status</th>
                            <th>TX Hash</th>
                        </tr>
                    </thead>
                    <tbody id="transfer-history">
                        <tr>
                            <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 1.5rem;">
                                No transfers yet
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let currentMode = 'MANUAL';
        let updateInterval;
        let refreshRate = 5000;
        let currentCurrency = 'USD';
        let ethPrice = 2500; // Default ETH price in USD

        document.addEventListener('DOMContentLoaded', function () {
            loadSettings();
            fetchEthPrice();
            fetchProfitData();
            loadTransferHistory();
            startAutoRefresh();
        });

        async function fetchEthPrice() {
            // Fetch current ETH price (simulated - in production use CoinGecko API)
            try {
                ethPrice = 2500 + (Math.random() * 100 - 50); // Simulate price fluctuation
            } catch (error) {
                console.error('Error fetching ETH price:', error);
            }
        }

        function formatCurrency(usdAmount) {
            if (currentCurrency === 'USD') {
                return `$${usdAmount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            } else {
                const ethAmount = usdAmount / ethPrice;
                return `${ethAmount.toFixed(6)} ETH`;
            }
        }

        function updateCurrency() {
            currentCurrency = document.getElementById('currency-selector').value;
            localStorage.setItem('alpha08_currency', currentCurrency);
            fetchProfitData(); // Refresh display with new currency
            showNotification(`Currency changed to ${currentCurrency}`, 'success');
        }

        function startAutoRefresh() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(fetchProfitData, refreshRate);
        }

        function updateRefreshInterval() {
            refreshRate = parseInt(document.getElementById('refresh-interval').value);
            startAutoRefresh();
            showNotification(`Refresh interval set to ${refreshRate / 1000}s`, 'success');
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('mode-manual').classList.toggle('active', mode === 'MANUAL');
            document.getElementById('mode-auto').classList.toggle('active', mode === 'AUTO');
            document.getElementById('threshold-group').style.display = mode === 'AUTO' ? 'block' : 'none';
            document.getElementById('amount-group').style.display = mode === 'MANUAL' ? 'block' : 'none';

            fetch(`${API_BASE}/api/withdrawal/set-mode`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: mode })
            })
                .then(response => response.json())
                .then(data => showNotification(`Mode set to ${mode}`, 'success'))
                .catch(error => showNotification(`Error: ${error.message}`, 'error'));
        }

        function saveWallet() {
            const wallet = document.getElementById('wallet-input').value.trim();
            if (!wallet || !wallet.startsWith('0x') || wallet.length !== 42) {
                showNotification('Invalid wallet address', 'error');
                return;
            }

            fetch(`${API_BASE}/api/withdrawal/set-wallet`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ wallet_address: wallet })
            })
                .then(response => response.json())
                .then(data => {
                    localStorage.setItem('alpha08_wallet', wallet);
                    showNotification('Wallet saved', 'success');
                })
                .catch(error => showNotification(`Error: ${error.message}`, 'error'));
        }

        function executeWithdrawal() {
            const wallet = document.getElementById('wallet-input').value.trim();
            let amount = currentMode === 'MANUAL'
                ? parseFloat(document.getElementById('amount-input').value)
                : parseFloat(document.getElementById('threshold-input').value);

            if (!amount || amount <= 0) {
                showNotification('Enter valid amount', 'error');
                return;
            }

            if (!wallet) {
                showNotification('Set wallet address first', 'error');
                return;
            }

            if (confirm(`Withdraw $${amount.toFixed(2)} to ${wallet.substring(0, 10)}...?`)) {
                fetch(`${API_BASE}/api/withdrawal/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount_usd: amount, wallet_address: wallet })
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.status === 'ERROR') {
                            showNotification(data.message, 'error');
                        } else {
                            showNotification(`Withdrawal submitted: ${data.request_id}`, 'success');
                            addTransferToHistory(data);
                            if (currentMode === 'MANUAL') document.getElementById('amount-input').value = '';
                        }
                    })
                    .catch(error => showNotification(`Error: ${error.message}`, 'error'));
            }
        }

        async function fetchProfitData() {
            try {
                const response = await fetch(`${API_BASE}/api/profit/current`);
                const data = await response.json();

                document.getElementById('profit-balance').textContent = formatCurrency(data.withdrawable_balance);
                document.getElementById('session-profit').textContent = formatCurrency(data.session_profit_usd);
                document.getElementById('cumulative-profit').textContent = formatCurrency(data.cumulative_profit_usd);
                document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            } catch (error) {
                console.error('Error fetching profit data:', error);
            }
        }

        function loadTransferHistory() {
            const history = JSON.parse(localStorage.getItem('alpha08_transfers') || '[]');
            if (history.length === 0) return;

            const tbody = document.getElementById('transfer-history');
            tbody.innerHTML = '';

            history.reverse().slice(0, 10).forEach(transfer => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${new Date(transfer.timestamp).toLocaleTimeString()}</td>
                    <td class="m-pos">$${transfer.amount.toFixed(2)}</td>
                    <td>${transfer.wallet.substring(0, 6)}...${transfer.wallet.substring(38)}</td>
                    <td>${transfer.mode}</td>
                    <td><span class="status-badge status-${transfer.status.toLowerCase()}">${transfer.status}</span></td>
                    <td>${transfer.tx_hash ? `<a href="https://polygonscan.com/tx/${transfer.tx_hash}" target="_blank" class="tx-hash">${transfer.tx_hash.substring(0, 8)}...</a>` : '-'}</td>
                `;
            });
        }

        function addTransferToHistory(data) {
            const history = JSON.parse(localStorage.getItem('alpha08_transfers') || '[]');
            history.push({
                timestamp: data.timestamp,
                amount: data.amount_usd,
                wallet: data.wallet_address,
                mode: data.mode,
                status: data.status,
                tx_hash: null,
                request_id: data.request_id
            });
            localStorage.setItem('alpha08_transfers', JSON.stringify(history));
            loadTransferHistory();
        }

        function loadSettings() {
            const savedWallet = localStorage.getItem('alpha08_wallet');
            if (savedWallet) {
                document.getElementById('wallet-input').value = savedWallet;
            }

            const savedCurrency = localStorage.getItem('alpha08_currency');
            if (savedCurrency) {
                currentCurrency = savedCurrency;
                document.getElementById('currency-selector').value = savedCurrency;
            }
        }

        function showNotification(message, type) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = `notification ${type} show`;
            setTimeout(() => notification.classList.remove('show'), 4000);
        }
    </script>
</body>

</html>
